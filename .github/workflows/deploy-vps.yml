name: Deploy to VPS

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          script_stop: true
          command_timeout: 60m
          script: |
            curl -fsSL https://raw.githubusercontent.com/nawar84/syaratiiq/main/deploy/vps-syaratiiq-production.sh -o /root/deploy.sh
            chmod +x /root/deploy.sh
            bash /root/deploy.sh 2>&1 | tee /root/deploy.log
