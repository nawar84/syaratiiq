# Server rendered from cariq.conf.template — replace __APP_DOMAIN__ and __APP_DIR__
# sudo env APP_DOMAIN=api.example.com APP_DIR=/var/www/cariq envsubst < deploy/nginx/cariq.conf.template > /etc/nginx/sites-available/cariq

server {
    listen 80;
    listen [::]:80;
    server_name __APP_DOMAIN__;

    root __APP_DIR__/backend/public;
    index index.php;

    charset utf-8;
    client_max_body_size 120M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/cariq-access.log;
    error_log  /var/log/nginx/cariq-error.log warn;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types application/json application/javascript application/xml text/css text/javascript text/plain text/xml image/svg+xml;

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ^~ /storage/ {
        alias __APP_DIR__/backend/storage/app/public/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(?!well-known).* { deny all; }
    location ~* \.(env|log|sql|sqlite|bak)$ { deny all; }
}
